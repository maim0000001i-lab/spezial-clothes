<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produk - Spezial Clothes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="produk-container">

<div class="profile">
            <img src="kontol.jpeg" alt="Logo">
            <h1>Spezial Clothes</h1>
            <p>Outfit keren, simpel, dan kekinian 🔥</p>
        </div>

        <!-- JUDUL -->
        <section class="produk-header">
            <h1>Spezial Clothes</h1>
            <p>Galeri & Lokasi</p>
        </section>

        <!-- LOKASI -->
        <section class="produk-lokasi">
            <h2>Lokasi Toko</h2>
            <p>Jl. Contoh Alamat No.123, Kota Kamu</p>
            <p>(Silakan ubah sesuai alamat asli)</p>
        </section>

        <!-- GALERI -->
        <section class="produk-galeri">
            <h2>Galeri Outfit</h2>

            <div class="produk-grid">
                <img src="https://source.unsplash.com/300x300/?fashion" alt="">
                <img src="https://source.unsplash.com/300x300/?clothing" alt="">
                <img src="https://source.unsplash.com/300x300/?streetwear" alt="">
                <img src="https://source.unsplash.com/300x300/?outfit" alt="">
                <img src="https://source.unsplash.com/300x300/?hoodie" alt="">
                <img src="https://source.unsplash.com/300x300/?tshirt" alt="">
            </div>

        </section>

        <!-- BACK BUTTON -->
        <div class="produk-back">
            <a href="../index.html">← Kembali</a>
        </div>

    </main>

</body>
</html>
